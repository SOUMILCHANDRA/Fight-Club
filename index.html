<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Mayhem | 3D</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000; 
      font-family: 'Inter', sans-serif;
    }
    canvas { display: block; }
    
    /* Premium UI Overlay */
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .stat-bar {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 300px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-fill {
      height: 100%;
      width: 100%;
      background: #fff;
      transition: width 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    #stamina-bar .stat-fill { background: #eee; }
    #sanity-bar { bottom: 55px; }
    #sanity-bar .stat-fill { background: #ff3e3e; }

    #personality-indicator {
      position: absolute;
      top: 40px;
      right: 40px;
      text-align: right;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 12px;
      opacity: 0.8;
    }

    #personality-name {
      font-size: 24px;
      font-weight: 900;
      display: block;
      margin-top: 5px;
    }

    .glitch-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 0, 0, 0.05);
      mix-blend-mode: color-dodge;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
  </style>
</head>
<body>
  <div id="ui-container">
    <div id="sanity-bar" class="stat-bar">
      <div class="stat-fill" style="width: 100%"></div>
    </div>
    <div id="stamina-bar" class="stat-bar">
      <div class="stat-fill" style="width: 100%"></div>
    </div>
    <div id="personality-indicator">
      MODE: <span id="personality-name">NARRATOR</span>
    </div>
    <div id="glitch-overlay" class="glitch-overlay"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
